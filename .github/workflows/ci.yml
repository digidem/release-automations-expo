name: CI

on:
    push:
        branches: [develop]
    pull_request:
        # By default, a workflow only runs when a pull_request's activity type is
        # opened, synchronize, or reopened. Adding ready_for_review here ensures
        # that CI runs when a PR is marked as not a draft, since we skip CI when a
        # PR is draft
        types: [opened, synchronize, reopened, ready_for_review]

jobs:
    format:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            fail-fast: false
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Install deps
              run: npm ci
            - name: Check formatting
              run: npm run check:format
    types:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        strategy:
            fail-fast: false
        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
            - name: Install deps
              run: npm ci
            - name: Check types
              run: npm run check:types
